<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Life OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
      --border: #2a2a2a; --text: #e8e8e8; --text2: #888; --text3: #555;
      --accent: #4f9cf9; --success: #4caf7d; --warning: #f0a742; --danger: #e25c5c;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 360px; width: 90%; }
    .login-logo { font-size: 36px; margin-bottom: 12px; }
    .login-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
    .btn-google { display: flex; align-items: center; gap: 12px; padding: 13px 24px; font-size: 15px; border-radius: 10px; background: #fff; color: #333; border: none; cursor: pointer; font-family: inherit; font-weight: 500; width: 100%; justify-content: center; transition: opacity 0.15s; }
    .btn-google:hover { opacity: 0.9; }

    /* Layout */
    #app { display: none; min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar { width: 210px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
    .sidebar-header { padding: 20px 16px 12px; }
    .sidebar-logo { font-size: 11px; letter-spacing: 0.1em; color: var(--text3); font-weight: 500; }
    .nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 16px; border: none; background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; text-align: left; font-family: inherit; transition: all 0.15s; position: relative; }
    .nav-btn:hover { color: var(--text); background: var(--bg3); }
    .nav-btn.active { color: var(--text); background: var(--bg3); }
    .nav-btn.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--accent); border-radius: 0 2px 2px 0; }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
    .user-email { font-size: 11px; color: var(--text3); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-name { font-size: 13px; color: var(--text2); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Main */
    .main { flex: 1; padding: 32px; overflow-y: auto; min-width: 0; }
    .section { display: none; }
    .section.active { display: block; }
    .section-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

    /* Buttons */
    .btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn:hover { border-color: var(--text3); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger { color: var(--danger) !important; border-color: transparent; background: transparent; }
    .btn-danger:hover { background: rgba(226,92,92,0.08); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--text2); }
    .btn-ghost:hover { color: var(--text); background: var(--bg3); }

    /* Cards */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
    .stat-card:hover { border-color: var(--text3); }
    .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 22px; font-weight: 700; }

    /* Forms */
    .form-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 14px; }
    input, select, textarea { width: 100%; padding: 9px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input[type=range] { padding: 0; background: transparent; border: none; accent-color: var(--accent); }
    input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent); }
    select option { background: var(--bg3); }
    .form-row { display: grid; gap: 8px; margin-bottom: 8px; }
    .cols-2 { grid-template-columns: 1fr 1fr; }
    .cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-actions { display: flex; gap: 8px; margin-top: 12px; }
    .form-label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; }

    /* List */
    .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; gap: 10px; }
    .item-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* Progress */
    .progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; background: var(--accent); }

    /* Badge */
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-blue { background: rgba(79,156,249,0.12); color: #4f9cf9; }
    .badge-green { background: rgba(76,175,125,0.12); color: #4caf7d; }
    .badge-yellow { background: rgba(240,167,66,0.12); color: #f0a742; }
    .badge-purple { background: rgba(167,139,250,0.12); color: #a78bfa; }
    .badge-gray { background: var(--bg3); color: var(--text2); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-tab { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .filter-tab.active { background: var(--bg3); color: var(--text); border-color: var(--text3); }

    /* Todo */
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; transition: opacity 0.2s; }
    .todo-item.done { opacity: 0.45; }
    .todo-item.task:hover { border-color: var(--text3); }
    .status-section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; user-select: none; padding: 4px 0; }
    .status-section-header:hover { opacity: 0.85; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 150; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
    .modal-section { margin-bottom: 20px; }
    .hint { font-size: 11px; color: var(--text3); margin-top: 6px; line-height: 1.5; }

    /* Side panel */
    .side-panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 99; }
    .side-panel-overlay.open { opacity: 1; pointer-events: auto; }
    .side-panel { position: fixed; top: 0; right: -520px; width: 520px; max-width: 92vw; height: 100vh; background: var(--bg2); border-left: 1px solid var(--border); transition: right 0.25s; z-index: 100; display: flex; flex-direction: column; }
    .side-panel.open { right: 0; }
    .side-panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .side-panel-body { flex: 1; overflow-y: auto; padding: 20px; }
    .panel-title { flex: 1; border: none; background: transparent; font-size: 17px; font-weight: 600; padding: 4px 6px; border-radius: 6px; }
    .panel-title:hover, .panel-title:focus { background: var(--bg3); }
    .comment-item { padding: 10px 12px; background: var(--bg3); border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
    .comment-item.system { background: transparent; border-left: 2px solid var(--border); padding: 4px 12px; color: var(--text2); font-size: 12px; margin-bottom: 4px; }
    .comment-time { font-size: 11px; color: var(--text3); margin-top: 4px; }

    /* Notes */
    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .note-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 0.15s; }
    .note-card:hover { border-color: var(--text3); }

    /* Event */
    .event-accent { width: 3px; height: 40px; border-radius: 2px; flex-shrink: 0; }

    /* Goal KR */
    .kr-item { padding: 10px 0 6px 14px; border-left: 2px solid var(--border); margin-bottom: 8px; }

    /* Two-col overview grid */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    /* Empty state */
    .empty { color: var(--text2); font-size: 14px; text-align: center; padding: 40px 20px; }

    /* Loading */
    #loading { color: var(--text2); font-size: 14px; text-align: center; padding: 60px; display: none; }

    /* Mobile */
    @media (max-width: 640px) {
      .sidebar { width: 56px; }
      .sidebar-logo, .nav-btn span:not(.nav-icon), .user-name, .user-email { display: none; }
      .nav-btn { justify-content: center; padding: 14px; }
      .sidebar-bottom { padding: 10px; }
      .main { padding: 16px; }
      .two-col { grid-template-columns: 1fr; }
      .cols-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">⊞</div>
    <div class="login-title">My Life OS</div>
    <div class="login-sub">나만의 개인 대시보드</div>
    <button class="btn-google" id="login-btn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Google로 로그인
    </button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">MY LIFE OS</div>
      </div>
      <nav>
        <button class="nav-btn active" data-section="overview"><span class="nav-icon">⊞</span><span>대시보드</span></button>
        <button class="nav-btn" data-section="assets"><span class="nav-icon">₩</span><span>자산 / 재정</span></button>
        <button class="nav-btn" data-section="projects"><span class="nav-icon">◈</span><span>개발 프로젝트</span></button>
        <button class="nav-btn" data-section="todos"><span class="nav-icon">✓</span><span>업무 / 할일</span></button>
        <button class="nav-btn" data-section="notes"><span class="nav-icon">≡</span><span>메모 / 아이디어</span></button>
        <button class="nav-btn" data-section="goals"><span class="nav-icon">◎</span><span>목표 / OKR</span></button>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-name" id="user-name"></div>
        <div class="user-email" id="user-email"></div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm btn-ghost" onclick="openSettings()" style="flex:1" title="설정">⚙️</button>
          <button class="btn btn-sm btn-ghost" id="logout-btn" style="flex:1">로그아웃</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div id="loading">불러오는 중...</div>

      <!-- Overview -->
      <div class="section" id="section-overview">
        <div class="section-title">대시보드</div>
        <div class="stat-grid" id="overview-stats"></div>
        <div class="card" style="margin-bottom:12px">
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">미완료 할일</div>
          <div id="overview-todos"></div>
        </div>
        <div class="card" id="overview-goals-card" style="display:none">
          <div style="font-size:12px;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em">목표 진행률</div>
          <div id="overview-goals"></div>
        </div>
      </div>

      <!-- Assets -->
      <div class="section" id="section-assets">
        <div class="section-header">
          <div class="section-title" style="margin:0">자산 / 재정</div>
          <button class="btn btn-primary" onclick="openAssetForm()">+ 자산</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div class="card"><div class="stat-label">총 자산</div><div style="font-size:28px;font-weight:700" id="asset-total">₩0</div></div>
          <div class="card" style="font-size:13px;line-height:1.8" id="asset-breakdown"></div>
        </div>
        <div id="asset-form-wrap"></div>
        <div id="asset-list"></div>

        <!-- Fixed Expenses sub-section -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin:32px 0 14px">
          <div style="font-size:18px;font-weight:600">고정지출 / 부채</div>
          <div style="display:flex;gap:6px;align-items:center">
            <button id="fe-filter-active" class="btn btn-sm" onclick="setFEFilter('active')">활성만</button>
            <button id="fe-filter-all" class="btn btn-sm" onclick="setFEFilter('all')">전체</button>
            <button class="btn btn-primary btn-sm" onclick="openFixedExpenseForm()">+ 추가</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px" id="fe-stats"></div>
        <div id="fe-breakdown" class="card" style="font-size:13px;line-height:1.8;margin-bottom:14px;display:none"></div>
        <div id="fe-form-wrap"></div>
        <div id="fe-list"></div>
      </div>

      <!-- Projects -->
      <div class="section" id="section-projects">
        <div class="section-header">
          <div class="section-title" style="margin:0">개발 프로젝트</div>
          <button class="btn btn-primary" onclick="openProjectForm()">+ 추가</button>
        </div>
        <div class="filter-tabs" id="project-filters"></div>
        <div id="project-form-wrap"></div>
        <div id="project-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px"></div>
      </div>

      <!-- Todos -->
      <div class="section" id="section-todos">
        <div class="section-header">
          <div class="section-title" style="margin:0">업무 / 할일</div>
          <span id="todo-count" style="font-size:13px;color:var(--text2)"></span>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
          <input id="todo-input" placeholder="할일 입력... (Enter로 추가)" style="flex:1;min-width:150px" onkeydown="if(event.key==='Enter')addTodo()">
          <select id="todo-priority" style="width:90px"><option>높음</option><option selected>중간</option><option>낮음</option></select>
          <input type="date" id="todo-due" style="width:140px">
          <button class="btn btn-primary" onclick="addTodo()">추가</button>
          <button class="btn" onclick="addTask()" title="상세 업무 추가">+ 업무</button>
        </div>
        <div id="todo-list"></div>
      </div>


      <!-- Notes -->
      <div class="section" id="section-notes">
        <div id="notes-list-view">
          <div class="section-header">
            <div class="section-title" style="margin:0">메모 / 아이디어</div>
            <button class="btn btn-primary" onclick="openNoteForm()">+ 새 메모</button>
          </div>
          <input id="note-search" placeholder="검색..." style="margin-bottom:14px" oninput="renderNotes()">
          <div id="note-form-wrap"></div>
          <div id="notes-grid" class="notes-grid"></div>
        </div>
        <div id="notes-detail-view" style="display:none">
          <button class="btn btn-ghost btn-sm" style="margin-bottom:16px" onclick="closeNoteDetail()">← 목록</button>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div style="font-size:22px;font-weight:700" id="note-detail-title"></div>
            <button class="btn btn-sm" onclick="editCurrentNote()">수정</button>
          </div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:24px" id="note-detail-date"></div>
          <div style="font-size:15px;line-height:1.85;white-space:pre-wrap" id="note-detail-content"></div>
        </div>
      </div>

      <!-- Goals -->
      <div class="section" id="section-goals">
        <div class="section-header">
          <div class="section-title" style="margin:0">목표 / OKR</div>
          <button class="btn btn-primary" onclick="openGoalForm()">+ 목표 추가</button>
        </div>
        <div id="goal-form-wrap"></div>
        <div id="goal-list"></div>
      </div>
    </div>
  </div>

  <!-- Task detail side panel -->
  <div id="side-panel-overlay" class="side-panel-overlay" onclick="closeTaskDetail()"></div>
  <div id="side-panel" class="side-panel"></div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="modal-card">
      <div class="modal-title">
        <span>⚙️ 설정</span>
        <button class="btn btn-ghost btn-sm" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-section">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px">GitHub 연동</div>
        <label class="form-label">Personal Access Token</label>
        <input type="password" id="settings-gh-token" placeholder="ghp_..." autocomplete="off">
        <div class="hint">
          repo + read:project 권한 필요. <a href="https://github.com/settings/tokens/new?scopes=repo,read:project&description=My%20Life%20OS" target="_blank" style="color:var(--accent)">토큰 생성 →</a><br>
          Firestore에 저장되어 다른 기기에서도 자동 사용됩니다.
        </div>
        <div id="settings-gh-status" style="font-size:12px;margin-top:10px"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:14px">
        <button class="btn" onclick="closeSettings()">닫기</button>
        <button class="btn btn-primary" onclick="saveSettings()">저장 + 테스트</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDOgreIfT93lths6Ik3_xxr7vN3XHTVlPA",
  authDomain: "my-life-os-ac878.firebaseapp.com",
  projectId: "my-life-os-ac878",
  storageBucket: "my-life-os-ac878.firebasestorage.app",
  messagingSenderId: "211654261736",
  appId: "1:211654261736:web:59b412a6191f13b5ac825d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let state = { assets: [], projects: [], todos: [], notes: [], goals: [], fixedExpenses: [], settings: {} };
let currentUser = null;
let saveTimer = null;
let viewingNoteId = null;
let currentProjectFilter = '전체';
let expandedGoals = new Set();

let collapsedTodoSections = new Set();

async function saveData() {

  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { await setDoc(doc(db, 'users', currentUser.uid, 'dashboard', 'data'), state); }
    catch(e) { console.error('저장 오류:', e); }
  }, 800);
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid, 'dashboard', 'data'));
    if (snap.exists()) state = snap.data();
  } catch(e) { console.error('불러오기 오류:', e); }
  state.fixedExpenses = state.fixedExpenses || [];
  state.settings = state.settings || {};
  document.getElementById('loading').style.display = 'none';
  renderAll();
  fetchAllProjectIssues();
}

// ── CHART HELPER ──────────────────────────────────────────────────
function donutChart(segments, opts = {}) {
  const total = segments.reduce((s, x) => s + x.value, 0);
  if (total === 0) return '<div style="color:var(--text2);font-size:13px;padding:20px 0">데이터 없음</div>';
  const size = opts.size || 140;
  const fmt = opts.format || (v => v.toLocaleString());
  const cx = size/2, cy = size/2, r = (size - 24)/2;
  const C = 2 * Math.PI * r;
  let off = 0;
  const arcs = segments.filter(s => s.value > 0).map(s => {
    const len = (s.value / total) * C;
    const arc = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="22" stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off += len;
    return arc;
  }).join('');
  const legend = segments.filter(s => s.value > 0).map(s => `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:2px 0">
      <span style="display:flex;align-items:center;gap:6px;color:var(--text);min-width:0"><span style="width:8px;height:8px;background:${s.color};border-radius:2px;flex-shrink:0"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.label}</span></span>
      <span style="color:var(--text2);font-size:11px;flex-shrink:0">${fmt(s.value)} (${Math.round(s.value/total*100)}%)</span>
    </div>`).join('');
  return `<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="22"/>
      ${arcs}
    </svg>
    <div style="flex:1;font-size:12px;line-height:1.7;min-width:140px">${legend}</div>
  </div>`;
}

// ── FIXED EXPENSES ────────────────────────────────────────────────
const FE_CATEGORIES = ['주거','구독','통신','보험','교통','교육','할부','대출','기타'];
const FE_COLORS = { '주거':'#4f9cf9','구독':'#a78bfa','통신':'#5ec5d4','보험':'#4caf7d','교통':'#f0a742','교육':'#e9d56b','할부':'#c084fc','대출':'#e25c5c','기타':'#888' };
const FE_TYPES = ['일반','할부','대출'];
const FE_FREQS = ['매월','매년'];
let feFilter = 'active';

const monthlyOf = (e) => {
  const amt = Number(e.amount || 0);
  if (e.frequency === '매년') return amt / 12;
  return amt;
};

const currentInstallmentOf = (e) => {
  if (e.type !== '할부') return 0;
  const total = Number(e.totalInstallments||0);
  if (e.startDate) {
    const [y, m] = e.startDate.split('-').map(Number);
    if (!y || !m) return Number(e.currentInstallment||0);
    const now = new Date();
    const monthDiff = (now.getFullYear() - y) * 12 + (now.getMonth() - (m - 1));
    const payDay = Number(e.payDay||0);
    const payHappenedThisMonth = !payDay || now.getDate() >= payDay;
    const elapsed = monthDiff + (payHappenedThisMonth ? 1 : 0);
    return Math.max(0, Math.min(elapsed, total));
  }
  return Number(e.currentInstallment||0);
};

const isInstallmentDone = (e) => e.type === '할부' && currentInstallmentOf(e) >= Number(e.totalInstallments||0) && Number(e.totalInstallments||0) > 0;

const remainingDebtOf = (e) => {
  if (e.type === '할부') {
    const remain = Math.max(0, Number(e.totalInstallments||0) - currentInstallmentOf(e));
    return remain * Number(e.amount||0);
  }
  if (e.type === '대출') return Number(e.remainingPrincipal||0);
  return 0;
};

const inferStartDate = (e) => {
  if (e.startDate) return e.startDate;
  const cur = Number(e.currentInstallment||0);
  if (!cur) return '';
  const d = new Date();
  d.setMonth(d.getMonth() - (cur - 1));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
};

const nextPayDays = (e) => {
  const day = Number(e.payDay||0);
  if (!day) return Infinity;
  const now = new Date();
  const today = now.getDate();
  if (e.frequency === '매월') {
    if (day >= today) return day - today;
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    return (daysInMonth - today) + day;
  }
  if (e.frequency === '매년') {
    const month = Number(e.payMonth||0);
    if (!month) return Infinity;
    const target = new Date(now.getFullYear(), month-1, day);
    if (target < now) target.setFullYear(target.getFullYear()+1);
    return Math.ceil((target - now) / (1000*60*60*24));
  }
  return Infinity;
};

const formatPayDate = (e) => {
  if (e.frequency === '매월' && e.payDay) return `매월 ${e.payDay}일`;
  if (e.frequency === '매년' && e.payMonth && e.payDay) return `매년 ${e.payMonth}월 ${e.payDay}일`;
  if (e.frequency === '매년') return '매년';
  return '매월';
};

function renderFixedExpenses() {
  const all = state.fixedExpenses || [];
  const filtered = feFilter === 'active' ? all.filter(e => e.active !== false && !isInstallmentDone(e)) : all;

  const monthlyTotal = filtered.reduce((s,e) => s + monthlyOf(e), 0);
  const debtTotal = filtered.reduce((s,e) => s + remainingDebtOf(e), 0);
  const upcomingCount = filtered.filter(e => nextPayDays(e) <= 7).length;

  document.getElementById('fe-stats').innerHTML = `
    <div class="card"><div class="stat-label">월 고정지출</div><div style="font-size:22px;font-weight:700;color:#f0a742">₩${Math.round(monthlyTotal).toLocaleString()}</div></div>
    <div class="card"><div class="stat-label">총 부채</div><div style="font-size:22px;font-weight:700;color:#e25c5c">₩${Math.round(debtTotal).toLocaleString()}</div></div>
    <div class="card"><div class="stat-label">7일 내 결제</div><div style="font-size:22px;font-weight:700;color:#a78bfa">${upcomingCount}건</div></div>
  `;

  const byCat = FE_CATEGORIES.map(c => ({ c, sum: filtered.filter(e => e.category === c).reduce((s,e)=>s+monthlyOf(e), 0) })).filter(x => x.sum > 0);
  const breakdownEl = document.getElementById('fe-breakdown');
  if (byCat.length) {
    breakdownEl.style.display = '';
    breakdownEl.innerHTML = donutChart(byCat.map(x => ({ label: x.c, value: x.sum, color: FE_COLORS[x.c]||'#888' })), { format: v => '₩'+Math.round(v).toLocaleString() });
  } else {
    breakdownEl.style.display = 'none';
  }

  document.getElementById('fe-filter-active').classList.toggle('btn-primary', feFilter==='active');
  document.getElementById('fe-filter-all').classList.toggle('btn-primary', feFilter==='all');

  const sorted = [...filtered].sort((a,b) => nextPayDays(a) - nextPayDays(b));
  document.getElementById('fe-list').innerHTML = sorted.map(e => {
    const days = nextPayDays(e);
    const dayLabel = days === Infinity ? '' : days === 0 ? '오늘' : `D-${days}`;
    const inactive = e.active === false || isInstallmentDone(e);
    const typeBadge = e.type && e.type !== '일반' ? `<span class="badge ${e.type==='할부'?'badge-purple':'badge-yellow'}" style="font-size:10px">${e.type}</span>` : '';
    let extraInfo = '';
    let nextHint = '';
    if (e.type === '할부') {
      const total = Number(e.totalInstallments||0);
      const cur = currentInstallmentOf(e);
      const remain = Math.max(0, total - cur);
      extraInfo = ` · ${cur}/${total}회 · 남은 ₩${(remain * Number(e.amount||0)).toLocaleString()}`;
      if (cur < total && e.payDay && e.frequency === '매월') {
        const pd = Number(e.payDay);
        const now = new Date();
        const tdy = now.getDate();
        const dim = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        const dn = tdy < pd ? (pd - tdy) : ((dim - tdy) + pd);
        const dt = dn === 0 ? '오늘' : `D-${dn}`;
        nextHint = `<div style="font-size:11px;color:var(--text3);margin-top:2px">↳ ${dt} 결제일에 ${cur+1}/${total}회로 갱신 예정</div>`;
      }
    } else if (e.type === '대출') {
      extraInfo = ` · 잔여 ₩${Number(e.remainingPrincipal||0).toLocaleString()}`;
    }
    return `<div class="list-item" style="${inactive?'opacity:0.5':''}">
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span>${e.name}</span>
          ${typeBadge}
          <span class="badge badge-gray" style="font-size:10px">${e.category||'기타'}</span>
          ${dayLabel?`<span style="font-size:11px;color:${days<=3?'var(--danger)':days<=7?'var(--warning)':'var(--text3)'}">${dayLabel}</span>`:''}
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px">₩${Number(e.amount||0).toLocaleString()} · ${formatPayDate(e)}${extraInfo}</div>
        ${nextHint}
        ${e.memo?`<div style="font-size:12px;color:var(--text3);margin-top:3px">${e.memo}</div>`:''}
      </div>
      <div class="item-actions">
        <button class="btn btn-sm" onclick="toggleFEActive('${e.id}')" title="${e.active===false?'활성화':'비활성화'}">${e.active===false?'▶':'⏸'}</button>
        <button class="btn btn-sm" onclick="editFixedExpense('${e.id}')">수정</button>
        <button class="btn btn-sm btn-danger" onclick="deleteFixedExpense('${e.id}')">✕</button>
      </div>
    </div>`;
  }).join('') || `<div class="empty">${feFilter==='active'?'활성 항목이 없습니다':'고정지출을 추가해보세요'}</div>`;
}

};

  const name = document.getElementById('fef-name').value.trim();
  if (!name) return;
  const type = document.getElementById('fef-type').value;
  const e = {
    name,
    amount: Number(document.getElementById('fef-amount').value) || 0,
    frequency: document.getElementById('fef-frequency').value,
    category: document.getElementById('fef-category').value,
    type,
    payDay: Number(document.getElementById('fef-day').value) || 0,
    payMonth: Number(document.getElementById('fef-month').value) || 0,
    memo: document.getElementById('fef-memo').value.trim(),
    active: true,
  };
  if (type === '할부') {
    e.startDate = document.getElementById('fef-start').value || '';
    e.totalInstallments = Number(document.getElementById('fef-total').value) || 0;
  } else if (type === '대출') {
    e.remainingPrincipal = Number(document.getElementById('fef-principal').value) || 0;
  }
  if (id) state.fixedExpenses = state.fixedExpenses.map(x => x.id === id ? {...x, ...e} : x);
  else state.fixedExpenses.push({ id: uid(), ...e });
  document.getElementById('fe-form-wrap').innerHTML = '';
  renderFixedExpenses(); saveData();
};

window.deleteFixedExpense = (id) => {
  if (!confirm('이 항목을 삭제할까요?')) return;
  state.fixedExpenses = state.fixedExpenses.filter(x => x.id !== id);
  renderFixedExpenses(); saveData();
};

window.toggleFEActive = (id) => {
  state.fixedExpenses = state.fixedExpenses.map(x => x.id === id ? {...x, active: x.active === false} : x);
  renderFixedExpenses(); saveData();
};

// ── PROJECTS ──────────────────────────────────────────────────────
const STATUSES = ['계획중','진행중','완료','보류'];
const SBADGE = { '계획중':'badge-blue','진행중':'badge-yellow','완료':'badge-green','보류':'badge-gray' };
const PLATFORMS = ['Web','iOS','Android','Desktop','CLI','기타'];
const PHASES = ['기획','MVP','베타','출시','유지보수'];
const PBADGE = { '기획':'badge-gray','MVP':'badge-blue','베타':'badge-purple','출시':'badge-green','유지보수':'badge-yellow' };

function renderIssueBadge(p) {
  if (!p.github) return '';
  const parsed = parseRepoKey(p.github);
  if (!parsed) return '';
  const cached = githubIssueCache[parsed.key];
  if (!cached) {
    if (state.settings?.githubToken) return '<span style="font-size:11px;color:var(--text3)" title="로딩 중">···</span>';
    return '';
  }
  if (cached.error) return `<span class="badge badge-gray" style="font-size:10px;cursor:help" title="${cached.error}">⚠ GitHub</span>`;
  if (cached.count === 0) return `<span class="badge badge-green" style="font-size:10px;cursor:pointer" onclick="openProjectIssues('${p.id}')" title="이슈 목록">✓ 0 이슈</span>`;
  return `<span class="badge badge-blue" style="font-size:10px;cursor:pointer" onclick="openProjectIssues('${p.id}')" title="이슈 목록 보기">📂 ${cached.count} 이슈</span>`;
}

function renderProjects() {
  document.getElementById('project-filters').innerHTML = ['전체',...STATUSES].map(f =>
    `<button class="filter-tab ${currentProjectFilter===f?'active':''}" onclick="setPF('${f}')">${f}</button>`
  ).join('');
  const filtered = currentProjectFilter === '전체' ? state.projects : state.projects.filter(p => p.status === currentProjectFilter);
  document.getElementById('project-list').innerHTML = filtered.map(p => {
    const topBadges = [
      p.platform ? `<span class="badge badge-gray">${p.platform}</span>` : '',
      p.phase ? `<span class="badge ${PBADGE[p.phase]||'badge-gray'}">${p.phase}</span>` : '',
      renderIssueBadge(p)
    ].filter(Boolean).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <span style="font-weight:600;font-size:15px">${p.name}</span>
        <span class="badge ${SBADGE[p.status]}">${p.status}</span>
      </div>
      ${topBadges?`<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">${topBadges}</div>`:''}
      ${p.stack?`<div style="font-size:12px;color:var(--text2);margin-bottom:6px">${p.stack}</div>`:''}
      ${p.desc?`<div style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.55">${p.desc}</div>`:''}
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px"><span>진행률</span><span>${p.progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div>
      </div>
      ${renderProjectTodos(p)}
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${p.github?`<a class="btn btn-sm" href="${p.github}" target="_blank" rel="noopener" style="text-decoration:none">GitHub ↗</a>`:''}
        <button class="btn btn-sm" onclick="editProject('${p.id}')">수정</button>
        <button class="btn btn-sm btn-danger" onclick="deleteProject('${p.id}')">삭제</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty" style="grid-column:1/-1">프로젝트를 추가해보세요!</div>';
}

function renderProjectTodos(p) {
  const todos = p.todos || [];
  const done = todos.filter(t => t.done).length;
  return `<div style="margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:8px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px">
      <span>📋 TODO</span><span>${done}/${todos.length}</span>
    </div>
    ${todos.map(t => `
      <div style="display:flex;align-items:center;gap:6px;padding:3px 0">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleProjectTodo('${p.id}','${t.id}')" style="cursor:pointer">
        <span style="flex:1;font-size:13px;${t.done?'text-decoration:line-through;color:var(--text2)':''}">${t.text}</span>
        <button onclick="deleteProjectTodo('${p.id}','${t.id}')" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:0 4px;line-height:1">×</button>
      </div>
    `).join('')}
    <input id="pt-input-${p.id}" placeholder="+ 항목 추가 (Enter)" style="width:100%;font-size:12px;padding:4px 8px;margin-top:6px" onkeydown="if(event.key==='Enter')addProjectTodo('${p.id}')">
  </div>`;
}

window.setPF = (f) => { currentProjectFilter = f; renderProjects(); };
window.openProjectForm = (id) => {
  const p = id ? state.projects.find(x => x.id === id) : {};
  document.getElementById('project-form-wrap').innerHTML = `
    <div class="form-card">
      <input id="pf-name" placeholder="프로젝트 이름" value="${p.name||''}" style="margin-bottom:8px;font-size:15px">
      <div class="form-row cols-2">
        <select id="pf-status">${STATUSES.map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}</select>
        <select id="pf-phase"><option value="">Phase 선택</option>${PHASES.map(s=>`<option ${p.phase===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="form-row cols-2">
        <select id="pf-platform"><option value="">플랫폼 선택</option>${PLATFORMS.map(s=>`<option ${p.platform===s?'selected':''}>${s}</option>`).join('')}</select>
        <input id="pf-stack" placeholder="스택 (React, Node.js...)" value="${p.stack||''}">
      </div>
      <input id="pf-github" placeholder="GitHub 링크 (https://github.com/...)" value="${p.github||''}" style="margin-bottom:8px">
      <textarea id="pf-desc" placeholder="프로젝트 설명" style="height:70px;resize:none;margin-bottom:8px">${p.desc||''}</textarea>
      <div style="margin-bottom:4px"><span class="form-label">진행률: <span id="pf-pv">${p.progress||0}</span>%</span></div>
      <input type="range" id="pf-progress" min="0" max="100" value="${p.progress||0}" oninput="document.getElementById('pf-pv').textContent=this.value" style="margin-bottom:4px">
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveProject('${id||''}')">저장</button>
        <button class="btn" onclick="document.getElementById('project-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};
window.editProject = (id) => openProjectForm(id);
window.saveProject = (id) => {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) return;
  const p = {
    name,
    status: document.getElementById('pf-status').value,
    phase: document.getElementById('pf-phase').value,
    platform: document.getElementById('pf-platform').value,
    stack: document.getElementById('pf-stack').value,
    github: document.getElementById('pf-github').value.trim(),
    desc: document.getElementById('pf-desc').value,
    progress: Number(document.getElementById('pf-progress').value)
  };
  if (id) state.projects = state.projects.map(x => x.id === id ? {...x,...p} : x);
  else state.projects.push({ id: uid(), todos: [], ...p });
  document.getElementById('project-form-wrap').innerHTML = '';
  renderProjects(); renderOverview(); saveData();
};
window.deleteProject = (id) => { state.projects = state.projects.filter(x => x.id !== id); renderProjects(); renderOverview(); saveData(); };
window.toggleProjectTodo = (pid, tid) => {
  const proj = state.projects.find(x => x.id === pid);
  if (!proj) return;
  proj.todos = (proj.todos||[]).map(t => t.id === tid ? {...t, done: !t.done} : t);
  renderProjects(); saveData();
};
window.deleteProjectTodo = (pid, tid) => {
  const proj = state.projects.find(x => x.id === pid);
  if (!proj) return;
  proj.todos = (proj.todos||[]).filter(t => t.id !== tid);
  renderProjects(); saveData();
};
window.addProjectTodo = (pid) => {
  const input = document.getElementById('pt-input-' + pid);
  const text = input.value.trim();
  if (!text) return;
  const proj = state.projects.find(x => x.id === pid);
  if (!proj) return;
  proj.todos = [...(proj.todos||[]), { id: uid(), text, done: false }];
  renderProjects(); saveData();
  setTimeout(() => document.getElementById('pt-input-' + pid)?.focus(), 0);
};

// ── TODOS ─────────────────────────────────────────────────────────
const PCOL = { '높음':'var(--danger)','중간':'var(--warning)','낮음':'var(--success)' };
const TASK_STATUSES = ['Todo','In Progress','Done'];
const SCOL = { 'Todo':'badge-blue','In Progress':'badge-yellow','Done':'badge-green' };

const isDone = (t) => t.type === 'task' ? t.status === 'Done' : !!t.done;
const escapeAttr = (s) => (s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const formatTs = (ts) => {
  const d = new Date(ts);
  return d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
};

function renderTodos() {
  const total = state.todos.length;
  const done = state.todos.filter(isDone).length;
  document.getElementById('todo-count').textContent = `${done} / ${total} 완료`;

  const buckets = { 'Todo': [], 'In Progress': [], 'Done': [] };
  state.todos.forEach(t => {
    if (t.type === 'task') buckets[TASK_STATUSES.includes(t.status) ? t.status : 'Todo'].push(t);
    else buckets[t.done ? 'Done' : 'Todo'].push(t);
  });

  document.getElementById('todo-list').innerHTML = TASK_STATUSES.map(s => {
    const items = buckets[s];
    const collapsed = collapsedTodoSections.has(s);
    return `<div style="margin-bottom:18px">
      <div class="status-section-header" onclick="toggleTodoSection('${s}')">
        <span style="font-size:10px;color:var(--text3);width:10px">${collapsed?'▶':'▼'}</span>
        <span class="badge ${SCOL[s]}">${s}</span>
        <span style="font-size:12px;color:var(--text2)">${items.length}</span>
      </div>
      ${!collapsed ? (items.length ? items.map(renderTodoItem).join('') : '<div class="empty" style="padding:12px;font-size:13px">없음</div>') : ''}
    </div>`;
  }).join('');
}

function renderTodoItem(t) {
  if (t.type === 'task') return renderTaskItem(t);
  return renderSimpleItem(t);
}

function renderSimpleItem(t) {
  return `<div class="todo-item ${t.done?'done':''}">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
    <div style="flex:1;font-size:14px;${t.done?'text-decoration:line-through':''}">${t.text}${t.due?`<span style="font-size:11px;color:var(--text3);margin-left:8px">${t.due}</span>`:''}</div>
    <span style="font-size:11px;font-weight:500;color:${PCOL[t.priority]||'var(--text2)'}">${t.priority||''}</span>
    <button class="btn btn-ghost btn-sm" onclick="promoteToTask('${t.id}')" title="업무로 전환">↗</button>
    <button class="btn btn-sm btn-danger" onclick="deleteTodo('${t.id}')">✕</button>
  </div>`;
}

function renderTaskItem(t) {
  const cmCount = (t.comments||[]).length;
  const meta = (t.due || cmCount > 0 || t.description) ? `<div style="font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:12px">
    ${t.due?`<span>📅 ${t.due}</span>`:''}
    ${cmCount>0?`<span>💬 ${cmCount}</span>`:''}
    ${t.description?`<span>📝</span>`:''}
  </div>` : '';
  return `<div class="todo-item task" style="cursor:pointer" onclick="openTaskDetail('${t.id}')">
    <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${PCOL[t.priority]||'var(--text2)'};flex-shrink:0" title="${t.priority||''}"></span>
    <div style="flex:1;font-size:14px;min-width:0">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.text}</div>
      ${meta}
    </div>
    <span class="badge ${SCOL[t.status||'Todo']}">${t.status||'Todo'}</span>
  </div>`;
}

function renderTaskDetail(t) {
  const comments = (t.comments||[]).slice().sort((a,b) => (a.ts||0) - (b.ts||0));
  return `
    <div class="side-panel-header">
      <input id="td-text" class="panel-title" value="${escapeAttr(t.text)}" onblur="updateTaskField('${t.id}','text',this.value)">
      <button class="btn btn-ghost" onclick="closeTaskDetail()">✕</button>
    </div>
    <div class="side-panel-body">
      <div class="form-row cols-3" style="margin-bottom:14px">
        <select id="td-status" onchange="updateTaskStatus('${t.id}', this.value)">
          ${TASK_STATUSES.map(s=>`<option ${(t.status||'Todo')===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <select id="td-priority" onchange="updateTaskField('${t.id}','priority',this.value)">
          ${['높음','중간','낮음'].map(p=>`<option ${(t.priority||'중간')===p?'selected':''}>${p}</option>`).join('')}
        </select>
        <input type="date" id="td-due" value="${t.due||''}" onchange="updateTaskField('${t.id}','due',this.value)">
      </div>
      <div style="margin-bottom:18px">
        <div class="form-label">설명</div>
        <textarea id="td-desc" placeholder="설명 추가..." style="height:90px;resize:vertical" onblur="updateTaskField('${t.id}','description',this.value)">${t.description||''}</textarea>
      </div>
      <div style="margin-bottom:14px">
        <div class="form-label">활동 / 코멘트</div>
        <div id="td-comments">${comments.length ? comments.map(c => renderComment(t.id, c)).join('') : '<div style="font-size:12px;color:var(--text3);padding:8px 0">아직 코멘트 없음</div>'}</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:24px">
        <input id="td-comment-input" placeholder="코멘트 작성... (Enter)" onkeydown="if(event.key==='Enter')addComment('${t.id}')" style="flex:1">
        <button class="btn btn-primary" onclick="addComment('${t.id}')">남기기</button>
      </div>
      <div style="padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="convertToSimple('${t.id}')" title="단순 할일로 변환">↩ 단순 할일로</button>
        <button class="btn btn-sm btn-danger" onclick="deleteTaskFromDetail('${t.id}')">삭제</button>
      </div>
    </div>
  `;
}

function renderComment(taskId, c) {
  if (c.system) {
    return `<div class="comment-item system">${c.text}<span style="margin-left:8px;color:var(--text3)">${formatTs(c.ts)}</span></div>`;
  }
  return `<div class="comment-item">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1;white-space:pre-wrap;word-break:break-word">${c.text}</div>
      <button onclick="deleteComment('${taskId}','${c.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0;line-height:1">×</button>
    </div>
    <div class="comment-time">${formatTs(c.ts)}</div>
  </div>`;
}

function refreshTaskDetail(id) {
  if (currentTaskDetailId !== id) return;
  const t = state.todos.find(x => x.id === id);
  if (!t) return closeTaskDetail();
  document.getElementById('side-panel').innerHTML = renderTaskDetail(t);
}

window.toggleTodoSection = (s) => {
  if (collapsedTodoSections.has(s)) collapsedTodoSections.delete(s);
  else collapsedTodoSections.add(s);
  renderTodos();
};

window.addTodo = () => {
  const text = document.getElementById('todo-input').value.trim();
  if (!text) return;
  state.todos.push({ id: uid(), text, done: false, priority: document.getElementById('todo-priority').value, due: document.getElementById('todo-due').value });
  document.getElementById('todo-input').value = '';
  document.getElementById('todo-due').value = '';
  renderTodos(); renderOverview(); saveData();
};
window.toggleTodo = (id) => {
  state.todos = state.todos.map(t => t.id===id && t.type!=='task' ? {...t,done:!t.done} : t);
  renderTodos(); renderOverview(); saveData();
};
window.deleteTodo = (id) => {
  state.todos = state.todos.filter(t => t.id!==id);
  renderTodos(); renderOverview(); saveData();
};

window.addTask = () => {
  const t = {
    id: uid(),
    type: 'task',
    text: '새 업무',
    status: 'Todo',
    priority: '중간',
    due: '',
    description: '',
    comments: [{ id: uid(), text: '생성됨', ts: Date.now(), system: true }]
  };
  state.todos.push(t);
  renderTodos(); renderOverview(); saveData();
  openTaskDetail(t.id);
  setTimeout(() => {
    const inp = document.getElementById('td-text');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
};

window.openTaskDetail = (id) => {
  const t = state.todos.find(x => x.id === id);
  if (!t || t.type !== 'task') return;
  currentTaskDetailId = id;
  document.getElementById('side-panel').innerHTML = renderTaskDetail(t);
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('side-panel-overlay').classList.add('open');
};

window.closeTaskDetail = () => {
  currentTaskDetailId = null;
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('side-panel-overlay').classList.remove('open');
};

window.updateTaskField = (id, field, value) => {
  state.todos = state.todos.map(t => t.id === id ? {...t, [field]: value} : t);
  renderTodos(); renderOverview(); saveData();
};

window.updateTaskStatus = (id, newStatus) => {
  const t = state.todos.find(x => x.id === id);
  if (!t) return;
  const oldStatus = t.status || 'Todo';
  if (oldStatus === newStatus) return;
  const sys = { id: uid(), text: `상태: ${oldStatus} → ${newStatus}`, ts: Date.now(), system: true };
  state.todos = state.todos.map(x => x.id === id ? {...x, status: newStatus, comments: [...(x.comments||[]), sys]} : x);
  refreshTaskDetail(id);
  renderTodos(); renderOverview(); saveData();
};

window.addComment = (id) => {
  const input = document.getElementById('td-comment-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const c = { id: uid(), text, ts: Date.now() };
  state.todos = state.todos.map(t => t.id === id ? {...t, comments: [...(t.comments||[]), c]} : t);
  refreshTaskDetail(id);
  setTimeout(() => document.getElementById('td-comment-input')?.focus(), 0);
  renderTodos(); saveData();
};

window.deleteComment = (taskId, commentId) => {
  state.todos = state.todos.map(t => t.id === taskId ? {...t, comments: (t.comments||[]).filter(c => c.id !== commentId)} : t);
  refreshTaskDetail(taskId);
  renderTodos(); saveData();
};

window.deleteTaskFromDetail = (id) => {
  if (!confirm('이 업무를 삭제할까요?')) return;
  state.todos = state.todos.filter(t => t.id !== id);
  closeTaskDetail();
  renderTodos(); renderOverview(); saveData();
};

window.promoteToTask = (id) => {
  const t = state.todos.find(x => x.id === id);
  if (!t) return;
  const sys = { id: uid(), text: '업무로 전환됨', ts: Date.now(), system: true };
  state.todos = state.todos.map(x => x.id === id ? {
    id: x.id, type: 'task', text: x.text,
    status: x.done ? 'Done' : 'Todo',
    priority: x.priority || '중간',
    due: x.due || '',
    description: '',
    comments: [sys]
  } : x);
  renderTodos(); renderOverview(); saveData();
  openTaskDetail(id);
};

window.convertToSimple = (id) => {
  if (!confirm('단순 할일로 변환하면 설명과 코멘트가 사라집니다. 계속할까요?')) return;
  state.todos = state.todos.map(x => x.id === id ? {
    id: x.id, text: x.text,
    done: x.status === 'Done',
    priority: x.priority || '중간',
    due: x.due || ''
  } : x);
  closeTaskDetail();
  renderTodos(); renderOverview(); saveData();
};

// ── GITHUB ────────────────────────────────────────────────────────
let githubIssueCache = {}; // { 'owner/repo': { count, issues, error, fetchedAt } }
let githubFetchInFlight = false;

const parseRepoKey = (url) => {
  if (!url) return null;
  const m = url.match(/github\.com[:/]+([\w.-]+)\/([\w.-]+?)(?:\.git)?(?:\/|$|\?|#)/);
  if (!m) return null;
  return { owner: m[1], repo: m[2], key: `${m[1]}/${m[2]}` };
};

async function fetchIssuesForProject(project) {
  const token = state.settings?.githubToken;
  if (!token) return;
  const parsed = parseRepoKey(project.github);
  if (!parsed) return;
  try {
    const resp = await fetch(`https://api.github.com/repos/${parsed.owner}/${parsed.repo}/issues?state=open&per_page=50`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
    });
    if (!resp.ok) {
      const errText = resp.status === 404 ? 'repo 없음' : resp.status === 401 ? '토큰 인증 실패' : `HTTP ${resp.status}`;
      githubIssueCache[parsed.key] = { error: errText, fetchedAt: Date.now() };
      return;
    }
    const items = await resp.json();
    const issues = items.filter(i => !i.pull_request);
    githubIssueCache[parsed.key] = { count: issues.length, issues, fetchedAt: Date.now() };
  } catch (e) {
    githubIssueCache[parsed.key] = { error: e.message, fetchedAt: Date.now() };
  }
}

async function fetchAllProjectIssues() {
  const token = state.settings?.githubToken;
  if (!token || githubFetchInFlight) return;
  githubFetchInFlight = true;
  try {
    const projects = state.projects.filter(p => p.github && parseRepoKey(p.github));
    await Promise.all(projects.map(fetchIssuesForProject));
    renderProjects();
  } finally {
    githubFetchInFlight = false;
  }
}

const formatRelative = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins < 1 ? '방금' : mins + '분 전'}`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}시간 전`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}일 전`;
  if (days < 30) return `${Math.floor(days/7)}주 전`;
  return `${Math.floor(days/30)}개월 전`;
};

function renderIssueItem(issue) {
  const labels = (issue.labels || []).map(l => {
    const c = (l.color || '888').replace(/^#/, '');
    return `<span style="display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;background:#${c}30;color:#${c};border:1px solid #${c}50">${l.name}</span>`;
  }).join(' ');
  const assigneeImg = issue.assignee ? `<img src="${issue.assignee.avatar_url}&s=20" style="width:16px;height:16px;border-radius:50%;vertical-align:middle">` : '';
  const bodyPreview = issue.body ? `<div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${issue.body.replace(/[#*`_~]/g,'').slice(0,200)}</div>` : '';
  return `<a href="${issue.html_url}" target="_blank" rel="noopener" style="display:block;padding:10px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;text-decoration:none;color:var(--text);transition:border-color 0.15s;border:1px solid transparent" onmouseover="this.style.borderColor='var(--text3)'" onmouseout="this.style.borderColor='transparent'">
    <div style="display:flex;align-items:flex-start;gap:8px">
      <span style="flex-shrink:0;color:var(--success);font-size:14px;line-height:1.2" title="open">◉</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;line-height:1.4">${issue.title} <span style="color:var(--text3);font-weight:normal;font-size:11px">#${issue.number}</span></div>
        ${bodyPreview}
        ${labels ? `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${labels}</div>` : ''}
        <div style="font-size:11px;color:var(--text3);margin-top:6px;display:flex;justify-content:space-between;align-items:center">
          <span>${formatRelative(issue.updated_at)}</span>
          ${assigneeImg ? `<span>${assigneeImg} ${issue.assignee.login}</span>` : ''}
        </div>
      </div>
    </div>
  </a>`;
}

function renderProjectIssuesPanel(p, parsed, cached) {
  const issues = cached?.issues || [];
  const error = cached?.error;
  const fetched = cached?.fetchedAt ? ` · ${formatRelative(new Date(cached.fetchedAt).toISOString())}` : '';
  return `
    <div class="side-panel-header">
      <div style="min-width:0;flex:1">
        <div style="font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${parsed.owner}/${parsed.repo}${fetched}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="btn btn-ghost btn-sm" onclick="refreshProjectIssues('${p.id}')" title="새로고침">🔄</button>
        <button class="btn btn-ghost btn-sm" onclick="closeTaskDetail()">✕</button>
      </div>
    </div>
    <div class="side-panel-body">
      ${error ? `<div style="color:var(--danger);font-size:13px;padding:12px;background:rgba(226,92,92,0.08);border-radius:8px">⚠ ${error}</div>` : ''}
      ${!error && issues.length === 0 ? `<div class="empty" style="padding:40px 0">🎉 열린 이슈 없음</div>` : ''}
      ${issues.map(renderIssueItem).join('')}
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:8px">
        <a href="https://github.com/${parsed.owner}/${parsed.repo}/issues/new" target="_blank" rel="noopener" class="btn btn-sm" style="text-decoration:none">+ 새 이슈</a>
        <a href="https://github.com/${parsed.owner}/${parsed.repo}/issues" target="_blank" rel="noopener" class="btn btn-sm btn-ghost" style="text-decoration:none">GitHub에서 열기 ↗</a>
      </div>
    </div>
  `;
}

window.openProjectIssues = (pid) => {
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  const parsed = parseRepoKey(p.github);
  if (!parsed) return;
  currentTaskDetailId = null;
  const cached = githubIssueCache[parsed.key];
  document.getElementById('side-panel').innerHTML = renderProjectIssuesPanel(p, parsed, cached);
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('side-panel-overlay').classList.add('open');
};

window.refreshProjectIssues = async (pid) => {
  const p = state.projects.find(x => x.id === pid);
  if (!p) return;
  const parsed = parseRepoKey(p.github);
  if (!parsed) return;
  document.getElementById('side-panel').innerHTML = renderProjectIssuesPanel(p, parsed, { fetchedAt: Date.now() }) ;
  await fetchIssuesForProject(p);
  openProjectIssues(pid);
  renderProjects();
};

// ── SETTINGS ──────────────────────────────────────────────────────
window.openSettings = () => {
  document.getElementById('settings-gh-token').value = state.settings?.githubToken || '';
  document.getElementById('settings-gh-status').innerHTML = state.settings?.githubToken ? '<span style="color:var(--success)">토큰 저장됨</span>' : '';
  document.getElementById('settings-modal').classList.add('open');
};

window.closeSettings = () => {
  document.getElementById('settings-modal').classList.remove('open');
};

window.saveSettings = async () => {
  const token = document.getElementById('settings-gh-token').value.trim();
  const statusEl = document.getElementById('settings-gh-status');

  if (!token) {
    state.settings.githubToken = '';
    githubIssueCache = {};
    await saveData();
    statusEl.innerHTML = '<span style="color:var(--text2)">토큰이 삭제되었습니다</span>';
    renderProjects();
    return;
  }

  statusEl.innerHTML = '<span style="color:var(--text2)">연결 테스트 중...</span>';
  try {
    const resp = await fetch('https://api.github.com/user', {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
    });
    if (!resp.ok) throw new Error(resp.status === 401 ? '인증 실패 - 토큰이 잘못되었거나 만료됨' : `HTTP ${resp.status}`);
    const user = await resp.json();
    state.settings.githubToken = token;
    await saveData();
    statusEl.innerHTML = `<span style="color:var(--success)">✓ <b>${user.login}</b> 로 연결됨</span>`;
    fetchAllProjectIssues();
  } catch (e) {
    statusEl.innerHTML = `<span style="color:var(--danger)">✗ ${e.message}</span>`;
  }
};

// ── NOTES ─────────────────────────────────────────────────────────
window.renderNotes = () => {
  const q = (document.getElementById('note-search').value||'').toLowerCase();
  const filtered = q ? state.notes.filter(n=>n.title.toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)) : state.notes;
  document.getElementById('notes-grid').innerHTML = filtered.map(n =>
    `<div class="note-card" onclick="viewNote('${n.id}')">
      <div style="font-weight:500;font-size:14px;margin-bottom:6px">${n.title}</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical">${n.content||''}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span style="font-size:11px;color:var(--text3)">${n.date||''}</span>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteNote('${n.id}')">삭제</button>
      </div>
    </div>`
  ).join('') || `<div class="empty">${q?'검색 결과 없음':'아이디어를 기록해보세요!'}</div>`;
};

window.openNoteForm = (id) => {
  const n = id ? state.notes.find(x=>x.id===id) : {};
  document.getElementById('note-form-wrap').innerHTML = `
    <div class="form-card">
      <input id="nf-title" placeholder="제목" value="${n.title||''}" style="margin-bottom:8px;font-size:16px">
      <textarea id="nf-content" placeholder="내용을 입력하세요..." style="height:140px;resize:vertical;margin-bottom:0">${n.content||''}</textarea>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveNote('${id||''}')">저장</button>
        <button class="btn" onclick="document.getElementById('note-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};
window.saveNote = (id) => {
  const title = document.getElementById('nf-title').value.trim();
  if (!title) return;
  const n = { title, content: document.getElementById('nf-content').value, date: today() };
  if (id) state.notes = state.notes.map(x=>x.id===id?{...x,...n}:x);
  else state.notes.unshift({ id: uid(), ...n });
  document.getElementById('note-form-wrap').innerHTML = '';
  renderNotes(); renderOverview(); saveData();
};
window.viewNote = (id) => {
  viewingNoteId = id;
  const n = state.notes.find(x=>x.id===id);
  document.getElementById('notes-list-view').style.display = 'none';
  document.getElementById('notes-detail-view').style.display = 'block';
  document.getElementById('note-detail-title').textContent = n.title;
  document.getElementById('note-detail-date').textContent = n.date;
  document.getElementById('note-detail-content').textContent = n.content;
};
window.closeNoteDetail = () => {
  viewingNoteId = null;
  document.getElementById('notes-list-view').style.display = '';
  document.getElementById('notes-detail-view').style.display = 'none';
};
window.editCurrentNote = () => { const id = viewingNoteId; closeNoteDetail(); openNoteForm(id); };
window.deleteNote = (id) => { state.notes = state.notes.filter(n=>n.id!==id); renderNotes(); renderOverview(); saveData(); };

// ── GOALS ─────────────────────────────────────────────────────────
function renderGoals() {
  document.getElementById('goal-list').innerHTML = state.goals.map(g =>
    `<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div><span style="font-weight:600;font-size:15px">${g.title}</span>${g.deadline?`<span style="font-size:12px;color:var(--text2);margin-left:8px">~ ${g.deadline}</span>`:''}</div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm btn-ghost" onclick="toggleGE('${g.id}')">${expandedGoals.has(g.id)?'접기':'KR'}</button>
          <button class="btn btn-sm" onclick="editGoal('${g.id}')">수정</button>
          <button class="btn btn-sm btn-danger" onclick="deleteGoal('${g.id}')">삭제</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px"><span>전체 진행률</span><span style="font-weight:500">${g.progress}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${g.progress}%;background:var(--success)"></div></div>
      ${expandedGoals.has(g.id) && (g.keyResults||[]).length>0?`
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
          ${(g.keyResults||[]).map((kr,i)=>`
            <div class="kr-item">
              <div style="font-size:13px;margin-bottom:5px">${kr.text}</div>
              <div style="display:flex;align-items:center;gap:10px">
                <input type="range" min="0" max="100" value="${kr.progress||0}" style="flex:1;accent-color:var(--success)" oninput="updateKR('${g.id}',${i},this.value)">
                <span style="font-size:12px;color:var(--text2);min-width:32px">${kr.progress||0}%</span>
              </div>
            </div>`).join('')}
        </div>`:''}
    </div>`
  ).join('') || '<div class="empty">목표를 설정해보세요!</div>';
}

window.toggleGE = (id) => { if(expandedGoals.has(id))expandedGoals.delete(id);else expandedGoals.add(id); renderGoals(); };
window.updateKR = (goalId, idx, val) => {
  state.goals = state.goals.map(g => {
    if (g.id!==goalId) return g;
    const krs = (g.keyResults||[]).map((kr,i)=>i===idx?{...kr,progress:Number(val)}:kr);
    return {...g, keyResults:krs, progress: krs.length?Math.round(krs.reduce((s,k)=>s+k.progress,0)/krs.length):0};
  });
  renderGoals(); renderOverview(); saveData();
};
window.openGoalForm = (id) => {
  const g = id ? state.goals.find(x=>x.id===id) : {};
  document.getElementById('goal-form-wrap').innerHTML = `
    <div class="form-card">
      <input id="gf-title" placeholder="목표 (Objective)" value="${g.title||''}" style="margin-bottom:8px;font-size:15px">
      <div style="margin-bottom:8px"><span class="form-label">마감일</span><input type="date" id="gf-deadline" value="${g.deadline||''}"></div>
      <span class="form-label">핵심 결과물 Key Results (한 줄에 하나)</span>
      <textarea id="gf-krs" placeholder="앱 출시&#10;MAU 1000명 달성&#10;수익화 달성" style="height:90px;resize:none;margin-bottom:0">${(g.keyResults||[]).map(k=>k.text).join('\n')}</textarea>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveGoal('${id||''}')">저장</button>
        <button class="btn" onclick="document.getElementById('goal-form-wrap').innerHTML=''">취소</button>
      </div>
    </div>`;
};
window.editGoal = (id) => openGoalForm(id);
window.saveGoal = (id) => {
  const title = document.getElementById('gf-title').value.trim();
  if (!title) return;
  const existKRs = id ? (state.goals.find(x=>x.id===id)?.keyResults||[]) : [];
  const keyResults = document.getElementById('gf-krs').value.split('\n').map(s=>s.trim()).filter(Boolean).map((text,i)=>({text,progress:existKRs[i]?.progress||0}));
  const g = { title, deadline: document.getElementById('gf-deadline').value, keyResults, progress: keyResults.length?Math.round(keyResults.reduce((s,k)=>s+k.progress,0)/keyResults.length):0 };
  if (id) state.goals = state.goals.map(x=>x.id===id?{...x,...g}:x);
  else state.goals.push({ id: uid(), ...g });
  document.getElementById('goal-form-wrap').innerHTML = '';
  renderGoals(); renderOverview(); saveData();
};
window.deleteGoal = (id) => { state.goals = state.goals.filter(x=>x.id!==id); renderGoals(); renderOverview(); saveData(); };
</script>
</body>
